name: TradingView Alerts

on:
  schedule:
    # Pre-market: every hour 4:00–9:30 AM ET (08:00–13:30 UTC) Mon–Fri
    - cron: "0 8,9,10,11,12,13 * * 1-5"
    # Regular market: every 15 min 9:30 AM–4:00 PM ET (13:30–20:00 UTC) Mon–Fri
    - cron: "*/15 13,14,15,16,17,18,19 * * 1-5"
    # Catch 20:00 UTC (4pm ET market close boundary)
    - cron: "0 20 * * 1-5"
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-alerts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas pandas-ta python-dotenv requests google-auth google-auth-oauthlib google-api-python-client

      - name: Write Gmail token
        run: echo "Aqui deberia ir lo de gmail" #echo "${{ secrets.GMAIL_TOKEN_JSON }}" | base64 --decode > token.json

      - name: Run alert script
        env:
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
          GIST_ID:         ${{ secrets.GIST_ID }}
          EMAIL_SENDER:    ${{ secrets.EMAIL_SENDER }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          COOLDOWN_SEC:    "300"
        run: python tradingview_apify_alerts.py
